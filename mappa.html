const TYPE_LABEL = {city:'Città',place:'Luogo',person:'Persona',org:'Organizzazione',event:'Evento/Lore',concept:'Concetto',astro:'Astro',sage:'Saggio',world:'Mondo'};
const TYPE_COLOR = {city:'#64d4d4',place:'#92e8e8',person:'#fda77f',org:'#f9ec00',event:'#4ade80',concept:'#a09b94',astro:'#fbbf24',sage:'#df3131',world:'#fcd29d'};
const enabled=new Set(Object.keys(TYPE_LABEL));
const inDeg={}; DATA.links.forEach(l => inDeg[l.target]=(inDeg[l.target]||0)+l.weight);
DATA.nodes.forEach(n => {n.inDeg=inDeg[n.id]||0; n.r=4+Math.sqrt(n.inDeg)*1.5;});
const filt=document.getElementById('filters');
Object.entries(TYPE_LABEL).forEach(([t,l]) => {const b=document.createElement('button'); b.dataset.t=t; b.textContent=l; b.onclick=()=>{if(enabled.has(t)){enabled.delete(t); b.classList.add('off');}else{enabled.add(t); b.classList.remove('off');} apply();}; filt.appendChild(b);});
const svg=d3.select('#graph');const W=window.innerWidth-340,H=window.innerHeight;svg.attr('viewBox',`0 0 ${W} ${H}`);const g=svg.append('g');svg.call(d3.zoom().scaleExtent([0.2,4]).on('zoom',e=>g.attr('transform',e.transform)));
const linkSel=g.append('g').selectAll('line').data(DATA.links).enter().append('line').attr('class','link').attr('stroke-width',d=>Math.min(5,0.6+Math.sqrt(d.weight)));
const nodeSel=g.append('g').selectAll('g').data(DATA.nodes).enter().append('g').attr('class','node').call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x; d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0); d.fx=null; d.fy=null;}));
nodeSel.append('circle').attr('r',d=>d.r).attr('fill',d=>TYPE_COLOR[d.type]);
nodeSel.append('text').attr('x',d=>d.r+3).attr('y',3).text(d=>d.name);
nodeSel.on('click',(e,d)=>selectNode(d));
nodeSel.on('dblclick',(e,d)=>{if(d.file)window.open(d.file,'_blank');});
const sim=d3.forceSimulation(DATA.nodes).force('link',d3.forceLink(DATA.links).id(d=>d.id).distance(d=>70/Math.sqrt(d.weight||1)).strength(0.25)).force('charge',d3.forceManyBody().strength(-180)).force('center',d3.forceCenter(W/2,H/2)).force('collide',d3.forceCollide().radius(d=>d.r+8)).on('tick',()=>{linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);});
function selectNode(d){const N=new Set([d.id]);DATA.links.forEach(l=>{if(l.source.id===d.id)N.add(l.target.id);if(l.target.id===d.id)N.add(l.source.id);});nodeSel.classed('selected',n=>n.id===d.id);nodeSel.classed('dim',n=>!N.has(n.id));linkSel.classed('highlight',l=>l.source.id===d.id||l.target.id===d.id);linkSel.classed('dim',l=>l.source.id!==d.id&&l.target.id!==d.id);const out=DATA.links.filter(l=>l.source.id===d.id).map(l=>({to:l.target,w:l.weight})).sort((a,b)=>b.w-a.w);const inn=DATA.links.filter(l=>l.target.id===d.id).map(l=>({from:l.source,w:l.weight})).sort((a,b)=>b.w-a.w);const det=document.getElementById('detail');let h=`<h3>${escH(d.name)}</h3><span class="type-badge" style="background:${TYPE_COLOR[d.type]}33;color:${TYPE_COLOR[d.type]}">${TYPE_LABEL[d.type]}</span>`;if(d.desc)h+=`<p class="desc">${escH(d.desc)}</p>`;if(d.snippet)h+=`<p class="snip">${escH(d.snippet)}…</p>`;if(d.file)h+=`<div class="links"><a href="${d.file}">Apri →</a></div>`;if(out.length){h+=`<h4>Cita (${out.length})</h4><ul>`;out.forEach(o=>h+=`<li data-id="${o.to.id}">→ ${escH(o.to.name)} <span style="color:var(--fg-muted)">×${o.w}</span></li>`);h+='</ul>';}if(inn.length){h+=`<h4>Citato da (${inn.length})</h4><ul>`;inn.forEach(o=>h+=`<li data-id="${o.from.id}">← ${escH(o.from.name)} <span style="color:var(--fg-muted)">×${o.w}</span></li>`);h+='</ul>';}det.innerHTML=h;det.querySelectorAll('li[data-id]').forEach(li=>li.onclick=()=>{const tgt=DATA.nodes.find(n=>n.id===li.dataset.id);if(tgt)selectNode(tgt);});}
function escH(s){return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);}
function apply(){nodeSel.style('display',d=>enabled.has(d.type)?'':'none');linkSel.style('display',l=>enabled.has(l.source.type)&&enabled.has(l.target.type)?'':'none');}
document.getElementById('q').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();if(!q){nodeSel.classed('dim',false);linkSel.classed('dim',false);return;}nodeSel.classed('dim',d=>!d.name.toLowerCase().includes(q));linkSel.classed('dim',true);});
svg.on('click',e=>{if(e.target.tagName==='svg'){nodeSel.classed('selected',false).classed('dim',false);linkSel.classed('highlight',false).classed('dim',false);document.getElementById('detail').innerHTML='<p class="desc">Click su un nodo per dettagli. Doppio click apre la pagina.</p>';}});
window.addEventListener('resize',()=>{const W2=window.innerWidth-340,H2=window.innerHeight;svg.attr('viewBox',`0 0 ${W2} ${H2}`);sim.force('center',d3.forceCenter(W2/2,H2/2)).alpha(0.3).restart();});
