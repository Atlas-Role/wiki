<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Azareus — Westmarch Wiki</title><style>
:root{--bg:#1e1f22;--bg-2:#2b2d31;--bg-3:#313338;--fg:#dbdee1;--fg-muted:#949ba4;--accent:#5865f2;--border:#1f2023;--link:#00a8fc;
--c-city:#3aa1ff;--c-place:#5cb8ff;--c-person:#ff8b3a;--c-org:#a972ff;--c-event:#23a55a;--c-concept:#80848e;--c-astro:#fbbf24;--c-sage:#dc2626;--c-world:#10b981}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font-family:'gg sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.55}
a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
.wrap{max-width:1100px;margin:0 auto;padding:24px 28px 80px}
.entity-head{margin-bottom:16px}.entity-head h1{margin:0 0 4px;font-size:26px}
.entity-head .type-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:8px}
.entity-head .desc{color:var(--fg-muted);font-style:italic;font-size:14px;margin:6px 0}
.btn{background:var(--bg-3);padding:6px 12px;border-radius:6px;font-size:13px;display:inline-block;margin-right:6px}
.section{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px}
.section h2{margin:0 0 12px;font-size:17px;border-bottom:1px solid var(--border);padding-bottom:8px}
.body-text p{margin:0 0 10px}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.related-card{background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:13px;display:block;color:var(--fg)}
.related-card:hover{border-color:var(--accent);text-decoration:none}
.related-card .name{font-weight:600}.related-card .meta{font-size:11px;color:var(--fg-muted);margin-top:2px}
.see-also{background:linear-gradient(135deg,#1f1d2e 0%,#2b2d31 100%);border:1px dashed var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px;margin-top:24px}
.see-also h2{margin:0 0 4px;font-size:17px;border:0;padding-bottom:0;color:var(--fg)}
.see-also .lead{color:var(--fg-muted);font-size:12px;margin:0 0 12px;font-style:italic}
.see-also .related-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.see-also .related-card{background:rgba(0,0,0,.25)}
.see-also .related-card:hover{border-color:#fbbf24}
.el{padding:1px 2px;border-radius:3px;font-weight:500}
.el-city{color:#3aa1ff;background:rgba(58,161,255,.08)}.el-place{color:#5cb8ff;background:rgba(92,184,255,.08)}
.el-person{color:#ff8b3a;background:rgba(255,139,58,.1)}.el-org{color:#a972ff;background:rgba(169,114,255,.1)}
.el-event{color:#23a55a;background:rgba(35,165,90,.1)}.el-concept{color:#a3a8ad;background:rgba(128,132,142,.12)}
.el-astro{color:#fbbf24;background:rgba(251,191,36,.1)}.el-sage{color:#dc2626;background:rgba(220,38,38,.1)}
.el-world{color:#10b981;background:rgba(16,185,129,.1)}
.el:hover{filter:brightness(1.3);text-decoration:underline}
.discord-msg{display:flex;gap:12px;padding:8px 0;border-top:1px solid var(--border)}
.discord-msg:first-child{border-top:0}
.discord-msg .avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:var(--bg-3)}
.discord-msg .body{flex:1;min-width:0}.discord-msg .head{font-size:12px;color:var(--fg-muted);margin-bottom:4px}
.discord-msg .head .name{color:#fff;font-weight:600;margin-right:8px}
.attachments{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.att-img{max-width:380px;max-height:280px;border-radius:6px;display:block;border:1px solid var(--border)}
.att-file{display:inline-block;background:var(--bg-3);padding:6px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px}
.menubar{position:sticky;top:0;background:var(--bg-2);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:12px;font-size:13px;z-index:10;flex-wrap:wrap;align-items:center}
.menubar .home{font-weight:700;margin-right:8px}.menubar a{color:var(--fg-muted)}
@media(max-width:700px){.wrap{padding:14px 16px 60px}.menubar{padding:10px 16px}}
